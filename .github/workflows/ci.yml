name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python syntax check
        run: |
          python -m py_compile pqc-audit.py

      - name: Help output smoke test
        run: |
          python3 pqc-audit.py --help

      - name: Repository hygiene check
        run: |
          bad=$(git ls-files | grep -E '(^|/)__pycache__/|\.pyc$|\.pyo$|\.DS_Store$|(^|/)\.venv/' || true)
          if [ -n "$bad" ]; then
            echo "Tracked junk files found:"
            echo "$bad"
            exit 1
          fi
